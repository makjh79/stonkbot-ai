<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StonkBOT.AI | Thinking</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --bg-elevated: #111111;
            --bg-card: #151515;
            --border: rgba(255,255,255,0.08);
            --text-primary: #f5f5f5;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-cyan: #06b6d4;
            --accent-yellow: #f59e0b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 1.5rem 1rem;
        }
        .container { max-width: 720px; margin: 0 auto; }
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.25rem;
            flex-wrap: wrap;
            gap: 0.75rem;
        }
        h1 { font-size: 1.35rem; font-weight: 700; letter-spacing: -0.02em; }
        .subtitle { color: var(--text-secondary); font-size: 0.75rem; margin-top: 0.15rem; }
        .back-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 500;
            padding: 0.4rem 0.7rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            transition: all 0.2s;
        }
        .back-link:hover { color: var(--text-primary); border-color: rgba(255,255,255,0.18); background: rgba(255,255,255,0.03); }

        .filters {
            display: flex;
            gap: 0.4rem;
            margin-bottom: 1.25rem;
            flex-wrap: wrap;
        }
        .filter-chip {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 0.7rem;
            font-weight: 600;
            padding: 0.35rem 0.75rem;
            border-radius: 999px;
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
        }
        .filter-chip:hover { color: var(--text-primary); border-color: rgba(255,255,255,0.18); }
        .filter-chip.active {
            color: var(--accent-cyan);
            border-color: rgba(6,182,212,0.4);
            background: rgba(6,182,212,0.08);
        }

        .day-label {
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--text-muted);
            margin: 1.5rem 0 0.6rem;
        }
        .day-label:first-of-type { margin-top: 0; }

        .entry {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-left: 3px solid var(--border);
            border-radius: 10px;
            padding: 0.7rem 0.9rem;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: baseline;
            gap: 0.75rem;
        }
        .entry.trade-buy  { border-left-color: var(--accent-green); background: linear-gradient(90deg, rgba(16,185,129,0.05), transparent 40%), var(--bg-card); }
        .entry.trade-sell { border-left-color: var(--accent-red); background: linear-gradient(90deg, rgba(239,68,68,0.05), transparent 40%), var(--bg-card); }
        .entry.digest     { border-left-color: var(--accent-cyan); background: linear-gradient(90deg, rgba(6,182,212,0.05), transparent 40%), var(--bg-card); }
        .entry.scan       { padding: 0.5rem 0.9rem; }

        .entry-time {
            font-size: 0.68rem;
            color: var(--text-muted);
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
            flex-shrink: 0;
            width: 42px;
        }
        .entry-text { font-size: 0.8rem; line-height: 1.45; color: var(--text-primary); }
        .entry.scan .entry-text { color: var(--text-muted); font-size: 0.74rem; }
        .entry.digest .entry-text { font-weight: 600; }
        .entry-why {
            display: block;
            font-size: 0.72rem;
            font-weight: 400;
            font-style: italic;
            color: var(--text-secondary);
            margin-top: 0.2rem;
            line-height: 1.4;
        }

        .empty, .offline {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.8rem;
            padding: 3rem 1rem;
            border: 1px dashed var(--border);
            border-radius: 10px;
        }
        .offline { display: none; }

        footer {
            margin-top: 2.5rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
            text-align: center;
            color: var(--text-muted);
            font-size: 0.68rem;
        }
        footer a { color: var(--text-secondary); text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>Thinking</h1>
                <div class="subtitle">Every trade, every quiet scan — the bot's decision stream.</div>
            </div>
            <a href="index.html" class="back-link">← Dashboard</a>
        </header>

        <div class="filters" id="filters">
            <button class="filter-chip active" data-f="all">All</button>
            <button class="filter-chip" data-f="trade">Trades</button>
            <button class="filter-chip" data-f="scan">Scans</button>
            <button class="filter-chip" data-f="digest">Digest</button>
        </div>

        <div id="stream">
            <div class="empty">Loading the bot's mind…</div>
        </div>
        <div class="offline" id="offline">
            Stream offline — the bot is still trading, this page just can't reach its notes.
        </div>

        <footer>
            <a href="index.html">StonkBOT.AI</a> · Data from Alpaca · Not investment advice
        </footer>
    </div>

    <script>
        let allEntries = [];
        let activeFilter = 'all';

        const ET_FMT_TIME = new Intl.DateTimeFormat('en-US', {
            timeZone: 'America/New_York', hour: '2-digit', minute: '2-digit', hour12: false
        });
        const ET_FMT_DAY = new Intl.DateTimeFormat('en-US', {
            timeZone: 'America/New_York', weekday: 'short', month: 'short', day: 'numeric'
        });
        const ET_FMT_ISO = new Intl.DateTimeFormat('en-CA', {
            timeZone: 'America/New_York', year: 'numeric', month: '2-digit', day: '2-digit'
        });

        function etDate(iso) { return ET_FMT_ISO.format(new Date(iso)); }

        function dayLabel(isoDay, todayIso, yesterdayIso) {
            if (isoDay === todayIso) return 'Today';
            if (isoDay === yesterdayIso) return 'Yesterday';
            return ET_FMT_DAY.format(new Date(isoDay + 'T12:00:00Z'));
        }

        function esc(s) {
            return String(s == null ? '' : s)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function entryClass(e) {
            if (e.type === 'trade') return e.action === 'BUY' ? 'trade-buy' : 'trade-sell';
            return e.type;
        }

        function render() {
            const el = document.getElementById('stream');
            const now = new Date();
            const todayIso = etDate(now.toISOString());
            const yesterdayIso = etDate(new Date(now.getTime() - 86400000).toISOString());

            const list = allEntries.filter(e => activeFilter === 'all' || e.type === activeFilter);
            if (!list.length) {
                el.innerHTML = '<div class="empty">The bot hasn\'t said anything yet. It does that.</div>';
                return;
            }

            let html = '';
            let lastDay = null;
            for (const e of list) {
                const d = e.et_date || etDate(e.ts);
                if (d !== lastDay) {
                    html += `<div class="day-label">${dayLabel(d, todayIso, yesterdayIso)}</div>`;
                    lastDay = d;
                }
                const time = ET_FMT_TIME.format(new Date(e.ts));
                const why = e.explainer ? `<span class="entry-why">${esc(e.explainer)}</span>` : '';
                html += `<div class="entry ${entryClass(e)}">` +
                        `<span class="entry-time">${time}</span>` +
                        `<span class="entry-text">${esc(e.text)}${why}</span></div>`;
            }
            el.innerHTML = html;
        }

        async function loadStream() {
            try {
                const r = await fetch('thinking_stream.json?t=' + Date.now(), { cache: 'no-store' });
                if (!r.ok) throw new Error(r.status);
                const d = await r.json();
                allEntries = d.entries || [];
                document.getElementById('offline').style.display = 'none';
                render();
            } catch (err) {
                if (!allEntries.length) {
                    document.getElementById('stream').innerHTML = '';
                    document.getElementById('offline').style.display = 'block';
                }
            }
        }

        document.getElementById('filters').addEventListener('click', (ev) => {
            const btn = ev.target.closest('.filter-chip');
            if (!btn) return;
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            activeFilter = btn.dataset.f;
            render();
        });

        loadStream();
        setInterval(loadStream, 60000);
    </script>
</body>
</html>
