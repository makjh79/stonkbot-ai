<!DOCTYPE html>
<html>
<head>
    <title>Popup Test</title>
    <style>
        :root {
            --bg-base: #0f1016;
            --bg-surface: #161822;
            --text-primary: #ffffff;
            --text-secondary: rgba(255,255,255,0.7);
            --text-muted: rgba(255,255,255,0.5);
        }
        body {
            background: var(--bg-base);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            padding: 20px;
        }
        .test-btn {
            padding: 12px 24px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px;
        }
    </style>
</head>
<body>
    <h2>Popup Test Page</h2>
    <button class="test-btn" onclick="testPopup()">Test Stock Popup</button>
    <button class="test-btn" onclick="testWatchlist()">Test Watchlist</button>
    <div id="log" style="margin-top: 20px; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px; font-family: monospace; font-size: 12px;"></div>

<script>
function log(msg) {
    document.getElementById('log').innerHTML += new Date().toLocaleTimeString() + ': ' + msg + '<br>';
}

// Mock data
const testStock = {
    symbol: 'AMD',
    company: 'Advanced Micro Devices',
    price: 145.50,
    changePct: 2.35,
    rsi: 32,
    aiScore: 87,
    stopLoss: 123.67,
    profit25: 181.88,
    strategy: 'RSI oversold bounce play with strong momentum',
    risk: 'High volatility, semiconductor cyclical'
};

function generateDynamicChartData(stock) {
    const prices = [];
    let price = stock.price * 0.95;
    for (let i = 0; i < 10; i++) {
        prices.push(price);
        price = price * (1 + (Math.random() - 0.45) * 0.03);
    }
    const minPrice = Math.min(...prices);
    const maxPrice = Math.max(...prices);
    return { prices, minPrice, maxPrice };
}

function toggleWatchStock(symbol) {
    log('toggleWatchStock called: ' + symbol);
    alert('Saved ' + symbol + ' to watchlist');
}

function showAIWatchlist() {
    log('showAIWatchlist called');
    const modal = document.createElement('div');
    modal.id = 'watchlist-modal';
    modal.style.cssText = 'position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); display: flex; align-items: center; justify-content: center; z-index: 10000; padding: 16px;';
    modal.innerHTML = `
        <div style="background: var(--bg-surface); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; max-width: 480px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 20px;">
            <h3>Test Watchlist</h3>
            <p>Click a stock to open popup:</p>
            <div onclick="showStockChart('AMD')" style="padding: 12px; background: rgba(255,255,255,0.05); border-radius: 8px; margin: 8px 0; cursor: pointer;">
                AMD - $145.50
            </div>
            <button onclick="document.getElementById('watchlist-modal').remove(); document.body.style.overflow = '';" style="margin-top: 20px; padding: 10px 20px;">Close Watchlist</button>
        </div>
    `;
    modal.onclick = function(e) { if (e.target === modal) { modal.remove(); document.body.style.overflow = ''; } };
    document.body.appendChild(modal);
    document.body.style.overflow = 'hidden';
}

function closeStockChart() {
    log('closeStockChart called');
    const modal = document.getElementById('stock-chart-modal');
    if (modal) {
        modal.remove();
        document.body.style.overflow = '';
    }
}

// THE NEW POPUP FUNCTION - to test
function showStockChart(symbol) {
    log('showStockChart called: ' + symbol);
    
    // Close watchlist modal if open
    const watchlistModal = document.getElementById('watchlist-modal');
    if (watchlistModal) {
        log('Closing watchlist modal');
        watchlistModal.remove();
    }
    
    const stock = testStock;
    const chartData = generateDynamicChartData(stock);
    
    const signal = stock.rsi <= 35 ? 'BUY' : stock.rsi <= 45 ? 'WATCH' : 'WAIT';
    const signalColor = stock.rsi <= 35 ? '#22c55e' : stock.rsi <= 45 ? '#fbbf24' : '#ef4444';
    const aiScoreColor = stock.aiScore >= 90 ? '#22c55e' : stock.aiScore >= 75 ? '#eab308' : '#06b6d4';
    const isOversold = stock.rsi <= 35;
    
    const stopPrice = stock.stopLoss || (stock.price * 0.85);
    const target25 = stock.profit25 || (stock.price * 1.25);
    const minPrice = chartData.minPrice;
    const maxPrice = chartData.maxPrice;
    const range = maxPrice - minPrice || 1;
    
    const chartBars = chartData.prices.map((price, i) => {
        const height = ((price - minPrice) / range * 60) + 20;
        const isUp = i > 0 && price >= chartData.prices[i-1];
        return `<div style="width: 8%; height: ${height}%; background: ${isUp ? '#22c55e' : '#ef4444'}; border-radius: 2px; opacity: ${isUp ? '1' : '0.8'};"></div>`;
    }).join('');
    
    const modal = document.createElement('div');
    modal.id = 'stock-chart-modal';
    modal.style.cssText = 'position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; z-index: 10001; padding: 16px;';
    
    // Build HTML using template literal
    modal.innerHTML = `<div style="background: var(--bg-surface); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; max-width: 400px; width: 100%; max-height: 90vh; overflow-y: auto;">
        <!-- Header -->
        <div style="padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.06);">
            <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 16px;">
                <div>
                    <div style="font-family: monospace; font-size: 26px; font-weight: 800;">${stock.symbol}</div>
                    <div style="font-size: 12px; color: var(--text-muted); margin-top: 2px;">${stock.company}</div>
                </div>
                <button onclick="closeStockChart()" style="background: none; border: none; color: var(--text-muted); font-size: 22px; cursor: pointer; padding: 4px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;">×</button>
            </div>
            
            <!-- Price row -->
            <div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px;">
                <div style="font-family: monospace; font-size: 32px; font-weight: 700;">$${stock.price.toFixed(2)}</div>
                <div style="text-align: right;">
                    <span style="color: ${stock.changePct >= 0 ? '#22c55e' : '#ef4444'}; font-weight: 600; font-size: 14px;">${stock.changePct >= 0 ? '▲' : '▼'} ${Math.abs(stock.changePct).toFixed(2)}%</span>
                    <div style="font-size: 11px; color: var(--text-muted);">today</div>
                </div>
            </div>
            
            <!-- Signal badge -->
            <div style="background: ${signalColor}15; border: 1px solid ${signalColor}; border-radius: 10px; padding: 12px 16px; display: flex; align-items: center; gap: 12px;">
                <div style="font-size: 24px; font-weight: 800; color: ${signalColor};">${signal}</div>
                <div style="flex: 1;">
                    <div style="font-size: 10px; color: ${signalColor}; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;">🎯 Signal</div>
                    <div style="font-size: 11px; color: var(--text-secondary);">${isOversold ? 'RSI oversold - entry zone' : stock.rsi <= 45 ? 'Approaching oversold' : 'Hold - wait for dip'}</div>
                </div>
            </div>
        </div>
        
        <!-- Body -->
        <div style="padding: 16px 20px;">
            <!-- 3 metrics -->
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px;">
                <div style="background: rgba(6,182,212,0.1); border-radius: 10px; padding: 12px 8px; text-align: center;">
                    <div style="font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;">RSI</div>
                    <div style="font-size: 20px; font-weight: 700; color: #06b6d4; margin: 4px 0;">${stock.rsi}</div>
                    <div style="font-size: 9px; color: var(--text-muted);">${isOversold ? 'OVERSOLD' : stock.rsi < 50 ? 'NEUTRAL' : 'HIGH'}</div>
                </div>
                <div style="background: ${aiScoreColor}15; border-radius: 10px; padding: 12px 8px; text-align: center;">
                    <div style="font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;">AI Score</div>
                    <div style="font-size: 20px; font-weight: 700; color: ${aiScoreColor}; margin: 4px 0;">${stock.aiScore}</div>
                    <div style="font-size: 9px; color: var(--text-muted);">${stock.aiScore >= 90 ? 'STRONG' : stock.aiScore >= 75 ? 'GOOD' : 'FAIR'}</div>
                </div>
                <div style="background: rgba(34,197,94,0.1); border-radius: 10px; padding: 12px 8px; text-align: center;">
                    <div style="font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;">Target</div>
                    <div style="font-size: 18px; font-weight: 700; color: #22c55e; margin: 4px 0;">$${target25.toFixed(0)}</div>
                    <div style="font-size: 9px; color: #22c55e;">+${((target25/stock.price-1)*100).toFixed(0)}%</div>
                </div>
            </div>
            
            <!-- Stop Loss -->
            <div style="background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); border-radius: 10px; padding: 12px 16px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <div style="font-size: 10px; color: #ef4444; text-transform: uppercase; letter-spacing: 0.5px;">Stop Loss</div>
                    <div style="font-family: monospace; font-size: 16px; font-weight: 700; color: #ef4444;">$${stopPrice.toFixed(2)}</div>
                </div>
                <div style="text-align: right;">
                    <div style="font-size: 10px; color: var(--text-muted);">Risk</div>
                    <div style="font-size: 13px; font-weight: 600; color: #ef4444;">-${((1-stopPrice/stock.price)*100).toFixed(1)}%</div>
                </div>
            </div>
            
            <!-- Chart -->
            <div style="margin-bottom: 16px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                    <span style="font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;">Price Action</span>
                    <span style="font-size: 10px; color: var(--text-muted);">10 days</span>
                </div>
                <div style="position: relative; height: 120px; background: rgba(0,0,0,0.3); border-radius: 10px; overflow: hidden;">
                    <div style="position: absolute; top: 0; left: 0; right: 0; height: 20%; background: rgba(34,197,94,0.1); border-bottom: 1px solid rgba(34,197,94,0.3);">
                        <span style="position: absolute; right: 8px; top: 2px; font-size: 9px; color: #22c55e;">🎯 $${target25.toFixed(0)}</span>
                    </div>
                    <div style="position: absolute; top: 40%; left: 0; right: 0; height: 20%; background: rgba(251,191,36,0.08); border-top: 1px dashed rgba(251,191,36,0.3); border-bottom: 1px dashed rgba(251,191,36,0.3);">
                        <span style="position: absolute; left: 8px; top: 50%; transform: translateY(-50%); font-size: 9px; color: #fbbf24;">Entry</span>
                    </div>
                    <div style="position: absolute; bottom: 0; left: 0; right: 0; height: 20%; background: rgba(239,68,68,0.1); border-top: 1px solid rgba(239,68,68,0.3);">
                        <span style="position: absolute; right: 8px; bottom: 2px; font-size: 9px; color: #ef4444;">🛑 $${stopPrice.toFixed(0)}</span>
                    </div>
                    <div style="position: absolute; bottom: 20%; left: 8px; right: 8px; height: 60%; display: flex; align-items: flex-end; justify-content: space-between; gap: 3px;">${chartBars}</div>
                    <div style="position: absolute; left: 0; right: 0; height: 2px; background: #fbbf24; top: 50%;">
                        <span style="position: absolute; right: 4px; top: -14px; font-size: 9px; color: #fbbf24; font-weight: 600;">$${stock.price.toFixed(0)}</span>
                    </div>
                </div>
            </div>
            
            <!-- Strategy -->
            <div style="background: rgba(255,255,255,0.03); border-radius: 10px; padding: 14px; margin-bottom: 16px;">
                <div style="font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;">Why this stock?</div>
                <div style="font-size: 13px; color: var(--text-secondary); line-height: 1.5;">${stock.strategy}</div>
                <div style="margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.06);">
                    <span style="font-size: 10px; color: #ef4444; font-weight: 600;">⚠ Risk: </span>
                    <span style="font-size: 12px; color: var(--text-secondary);">${stock.risk}</span>
                </div>
            </div>
            
            <!-- Buttons -->
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button onclick="toggleWatchStock('${stock.symbol}'); closeStockChart(); showAIWatchlist();" style="padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: var(--text-secondary); font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;">
                    <span>☆</span> Save
                </button>
                <button onclick="closeStockChart(); showAIWatchlist();" style="padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: var(--text-secondary); font-size: 14px; font-weight: 600; cursor: pointer;">
                    ← Back
                </button>
            </div>
        </div>
    </div>`;
    
    modal.onclick = function(e) { if (e.target === modal) closeStockChart(); };
    document.body.appendChild(modal);
    document.body.style.overflow = 'hidden';
    log('Popup opened successfully');
}

function testPopup() {
    log('Testing popup directly...');
    showStockChart('AMD');
}

function testWatchlist() {
    log('Testing watchlist flow...');
    showAIWatchlist();
}

log('Test page loaded. Click a button to test.');
</script>
</body>
</html>
