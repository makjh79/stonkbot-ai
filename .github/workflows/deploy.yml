name: Deploy to Live Server

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Deploy to Server via HTTPS
      env:
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
      run: |
        # Install sshpass for password-based SSH
        sudo apt-get update -qq && sudo apt-get install -y sshpass -qq
        
        # Add host to known hosts
        mkdir -p ~/.ssh
        ssh-keyscan -H 23.80.82.47 >> ~/.ssh/known_hosts 2>/dev/null || true
        
        # Deploy using password from secret
        sshpass -p "${{ secrets.SERVER_PASSWORD }}" ssh -o StrictHostKeyChecking=no root@23.80.82.47 \
          "cd /root/.openclaw/workspace && git pull https://makjh79:${GH_TOKEN}@github.com/makjh79/stonkbot-ai.git master && cp website/index.html /var/www/hedge-fund-website/index.html && echo 'Deployed at '\$(date) >> /var/www/hedge-fund-website/deploy.log"
