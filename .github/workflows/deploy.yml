name: Deploy to Live Server

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # Note: The live index.html is immutable on the server (chattr +i).
    # Only this workflow can modify it. No additional guard is needed.

    - name: Setup SSH and Deploy
      env:
        SSH_KEY_B64: ${{ secrets.SERVER_SSH_KEY }}
      run: |
        # Setup SSH directory
        mkdir -p ~/.ssh

        # Debug: Check if secret is set (don't print it!)
        if [ -z "$SSH_KEY_B64" ]; then
          echo "ERROR: SERVER_SSH_KEY secret is not set!"
          exit 1
        fi
        echo "Secret is set, length: ${#SSH_KEY_B64}"

        # Decode base64 key
        echo "$SSH_KEY_B64" | base64 -d > ~/.ssh/deploy_key 2>&1 || echo "Base64 decode failed"
        chmod 600 ~/.ssh/deploy_key

        # Debug: Check key format
        echo "Key file size: $(wc -c < ~/.ssh/deploy_key)"
        head -1 ~/.ssh/deploy_key

        # Add host to known hosts
        ssh-keyscan -H 23.80.82.47 >> ~/.ssh/known_hosts 2>/dev/null || true

        # Test SSH connection
        ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o BatchMode=yes root@23.80.82.47 "echo 'SSH connected'" || echo "SSH connection failed"

        # Deploy + clean up stale nginx backups
        # NOTE: Deploy from the main repo (/opt/stonk-ai), not the nested website-repo.
        # Sentiment/history data are generated in-place by the server pipeline.
        ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@23.80.82.47 \
          "cd /opt/stonk-ai && \
           git pull --autostash origin master && \
           \
           echo '--- restore stonkai ownership after root git pull ---' && \
           chown -R stonkai:stonkai /opt/stonk-ai && \
           \
           echo '--- pre-deploy feature checks ---' && \
           grep -q 'TAB PANEL: Orders' website/index.html || { echo 'FAIL: Orders tab missing'; exit 1; } && \
           grep -q 'Watchlist Tiers' website/index.html || { echo 'FAIL: About tab Watchlist Tiers missing'; exit 1; } && \
           grep -q \"'5M'\" website/index.html || { echo 'FAIL: 5M chip missing'; exit 1; } && \
           grep -q 'Updated: ' website/index.html || { echo 'FAIL: Freshness timestamp missing'; exit 1; } && \
           echo 'PASS: pre-deploy checks' && \
           \
           chattr -i /var/www/hedge-fund-website/index.html && \
           cp /opt/stonk-ai/website/index.html /var/www/hedge-fund-website/index.html && \
           chown stonkai:stonkai /var/www/hedge-fund-website/index.html && \
           chmod 0644 /var/www/hedge-fund-website/index.html && \
           chattr +i /var/www/hedge-fund-website/index.html && \
           \
           cp /opt/stonk-ai/website/performance.html /var/www/hedge-fund-website/performance.html && \
           chown stonkai:stonkai /var/www/hedge-fund-website/performance.html && \
           chmod 0644 /var/www/hedge-fund-website/performance.html && \
           \
           cp /opt/stonk-ai/website/thinking.html /var/www/hedge-fund-website/thinking.html && \
           chown stonkai:stonkai /var/www/hedge-fund-website/thinking.html && \
           chmod 0644 /var/www/hedge-fund-website/thinking.html && \
           \
           mkdir -p /var/www/hedge-fund-website/sentiment /var/www/hedge-fund-website/history && \
           rm -f /etc/nginx/sites-enabled/*.bak.* && \
           \
           echo '--- post-deploy verification ---' && \
           if diff -q /opt/stonk-ai/website/index.html /var/www/hedge-fund-website/index.html > /dev/null; then \
             echo 'PASS: web root matches source'; \
           else \
             echo 'FAIL: web root does not match source'; \
             exit 1; \
           fi && \
           \
           echo 'Deployed at '\$(date) >> /var/www/hedge-fund-website/deploy.log"
