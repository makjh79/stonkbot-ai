name: Deploy to Live Server

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Check for uncommitted changes on server
      env:
        SSH_KEY_B64: ${{ secrets.SERVER_SSH_KEY }}
      run: |
        # Setup SSH
        mkdir -p ~/.ssh
        echo "$SSH_KEY_B64" | base64 -d > ~/.ssh/deploy_key 2>/dev/null || true
        chmod 600 ~/.ssh/deploy_key
        ssh-keyscan -H 23.80.82.47 >> ~/.ssh/known_hosts 2>/dev/null || true
        
        # Check if live file differs from git
        echo "Checking if live site has uncommitted changes..."
        DIFF_OUTPUT=$(ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o BatchMode=yes root@23.80.82.47 \
          "diff /var/www/hedge-fund-website/index.html /root/.openclaw/workspace/website/index.html 2>&1 || echo 'DIFFERENT'")
        
        if echo "$DIFF_OUTPUT" | grep -q "DIFFERENT"; then
          echo "⚠️ WARNING: Live site has uncommitted changes!"
          echo "Run this on the server to sync changes back to git:"
          echo "  cp /var/www/hedge-fund-website/index.html /root/.openclaw/workspace/website/index.html"
          echo "  cd /root/.openclaw/workspace && git add website/index.html && git commit -m 'Sync live changes' && git push"
        else
          echo "✅ Live site matches git - safe to deploy"
        fi
    
    - name: Setup SSH and Deploy
      env:
        SSH_KEY_B64: ${{ secrets.SERVER_SSH_KEY }}
      run: |
        # Setup SSH directory
        mkdir -p ~/.ssh
        
        # Debug: Check if secret is set (don't print it!)
        if [ -z "$SSH_KEY_B64" ]; then
          echo "ERROR: SERVER_SSH_KEY secret is not set!"
          exit 1
        fi
        echo "Secret is set, length: ${#SSH_KEY_B64}"
        
        # Decode base64 key
        echo "$SSH_KEY_B64" | base64 -d > ~/.ssh/deploy_key 2>&1 || echo "Base64 decode failed"
        chmod 600 ~/.ssh/deploy_key
        
        # Debug: Check key format
        echo "Key file size: $(wc -c < ~/.ssh/deploy_key)"
        head -1 ~/.ssh/deploy_key
        
        # Add host to known hosts
        ssh-keyscan -H 23.80.82.47 >> ~/.ssh/known_hosts 2>/dev/null || true
        
        # Test SSH connection
        ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o BatchMode=yes root@23.80.82.47 "echo 'SSH connected'" || echo "SSH connection failed"
        
        # Deploy + attempt to set nginx no-cache headers (non-fatal)
        ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@23.80.82.47 \
          "cd /root/.openclaw/workspace && \
           git pull origin master && \
           cp website/index.html /var/www/hedge-fund-website/index.html && \
           (python3 scripts/patch_nginx_cache_headers.py 2>&1 || echo 'nginx header patch skipped/failed') && \
           echo 'Deployed at '\$(date) >> /var/www/hedge-fund-website/deploy.log"
