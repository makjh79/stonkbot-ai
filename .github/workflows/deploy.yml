name: Deploy to Live Server

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup SSH and Deploy
      env:
        SSH_KEY_B64: ${{ secrets.SERVER_SSH_KEY }}
      run: |
        # Setup SSH directory
        mkdir -p ~/.ssh
        
        # Debug: Check if secret is set (don't print it!)
        if [ -z "$SSH_KEY_B64" ]; then
          echo "ERROR: SERVER_SSH_KEY secret is not set!"
          exit 1
        fi
        echo "Secret is set, length: ${#SSH_KEY_B64}"
        
        # Decode base64 key
        echo "$SSH_KEY_B64" | base64 -d > ~/.ssh/deploy_key 2>&1 || echo "Base64 decode failed"
        chmod 600 ~/.ssh/deploy_key
        
        # Debug: Check key format
        echo "Key file size: $(wc -c < ~/.ssh/deploy_key)"
        head -1 ~/.ssh/deploy_key
        
        # Add host to known hosts
        ssh-keyscan -H 23.80.82.47 >> ~/.ssh/known_hosts 2>/dev/null || true
        
        # Test SSH connection
        ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o BatchMode=yes root@23.80.82.47 "echo 'SSH connected'" || echo "SSH connection failed"
        
        # Deploy
        ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@23.80.82.47 \
          "cd /root/.openclaw/workspace && \
           git pull origin master && \
           cp website/index.html /var/www/hedge-fund-website/index.html && \
           echo 'Deployed at '\$(date) >> /var/www/hedge-fund-website/deploy.log"
