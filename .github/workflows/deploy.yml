name: Deploy to Live Server

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # Note: The live index.html is immutable on the server (chattr +i).
    # Only this workflow can modify it. No additional guard is needed.

    - name: Setup SSH and Deploy
      env:
        SSH_KEY_B64: ${{ secrets.SERVER_SSH_KEY }}
      run: |
        # Setup SSH directory
        mkdir -p ~/.ssh

        # Debug: Check if secret is set (don't print it!)
        if [ -z "$SSH_KEY_B64" ]; then
          echo "ERROR: SERVER_SSH_KEY secret is not set!"
          exit 1
        fi
        echo "Secret is set, length: ${#SSH_KEY_B64}"

        # Decode base64 key
        echo "$SSH_KEY_B64" | base64 -d > ~/.ssh/deploy_key 2>&1 || echo "Base64 decode failed"
        chmod 600 ~/.ssh/deploy_key

        # Debug: Check key format
        echo "Key file size: $(wc -c < ~/.ssh/deploy_key)"
        head -1 ~/.ssh/deploy_key

        # Add host to known hosts
        ssh-keyscan -H 23.80.82.47 >> ~/.ssh/known_hosts 2>/dev/null || true

        # Test SSH connection
        ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o BatchMode=yes root@23.80.82.47 "echo 'SSH connected'" || echo "SSH connection failed"

        # Deploy + clean up stale nginx backups + set no-cache headers (non-fatal)
        ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@23.80.82.47 \
          "cd /opt/stonk-ai/website-repo && \
           git pull origin master && \
           chattr -i /var/www/hedge-fund-website/index.html && \
           cp website/index.html /var/www/hedge-fund-website/index.html && \
           chattr +i /var/www/hedge-fund-website/index.html && \
           rsync -a --delete website/sentiment/ /var/www/hedge-fund-website/sentiment/ && \
           rsync -a website/history/ /var/www/hedge-fund-website/history/ && \
           rm -f /etc/nginx/sites-enabled/*.bak.* && \
           python3 scripts/patch_nginx_cache_headers.py 2>&1 | tee /var/www/hedge-fund-website/.nginx-patch.log || echo 'nginx header patch failed, see .nginx-patch.log' && \
           echo 'Deployed at '\$(date) >> /var/www/hedge-fund-website/deploy.log"
